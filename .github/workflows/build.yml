name: Build Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.edition }} for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Full edition (GUI + OCR + Preview) ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            edition: full
            features: ""
            bin_name: markitdown-rst
            cli_bin: markitdown-cli
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            edition: full
            features: ""
            bin_name: markitdown-rst
            cli_bin: markitdown-cli
          - os: macos-latest
            target: x86_64-apple-darwin
            edition: full
            features: ""
            bin_name: markitdown-rst
            cli_bin: markitdown-cli
          # ── Light edition (GUI, no OCR, no Preview) ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            edition: light
            features: "--no-default-features --features gui"
            bin_name: markitdown-rst
            cli_bin: markitdown-cli
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            edition: light
            features: "--no-default-features --features gui"
            bin_name: markitdown-rst
            cli_bin: markitdown-cli
          - os: macos-latest
            target: x86_64-apple-darwin
            edition: light
            features: "--no-default-features --features gui"
            bin_name: markitdown-rst
            cli_bin: markitdown-cli
          # ── CLI-only edition (no GUI, with OCR) ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            edition: cli-only
            features: "--no-default-features --features cli-only"
            bin_name: ""
            cli_bin: markitdown-cli
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            edition: cli-only
            features: "--no-default-features --features cli-only"
            bin_name: ""
            cli_bin: markitdown-cli
          - os: macos-latest
            target: x86_64-apple-darwin
            edition: cli-only
            features: "--no-default-features --features cli-only"
            bin_name: ""
            cli_bin: markitdown-cli

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libx11-dev libx11-xcb-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxdamage-dev libxfixes-dev libxinerama-dev libwayland-dev \
            libgbm-dev libegl-dev libclang-dev libspeechd-dev \
            libtesseract-dev libleptonica-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: brew install tesseract leptonica

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.edition }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-${{ matrix.edition }}-cargo-

      # ── Build ──
      - name: Build GUI binary (Full / Light)
        if: matrix.bin_name != ''
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Build CLI binary (CLI-only)
        if: matrix.edition == 'cli-only'
        run: cargo build --release --bin markitdown-cli --target ${{ matrix.target }} ${{ matrix.features }}

      # ── Prepare artifacts ──
      # OS-specific naming: markitdown-rst-{edition}-{os}-x64[.exe]
      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $edition = "${{ matrix.edition }}"

          if ("${{ matrix.bin_name }}" -ne "") {
            $src = "target/$target/release/${{ matrix.bin_name }}.exe"
            $dst = "markitdown-rst-${edition}-windows-x64.exe"
            Copy-Item $src $dst
            Write-Host "GUI artifact: $dst ($('{0:N0}' -f (Get-Item $dst).Length) bytes)"
          }

          if ("${{ matrix.cli_bin }}" -ne "" -and $edition -ne "cli-only") {
            $src = "target/$target/release/${{ matrix.cli_bin }}.exe"
            $dst = "markitdown-cli-${edition}-windows-x64.exe"
            Copy-Item $src $dst
            Write-Host "CLI artifact: $dst ($('{0:N0}' -f (Get-Item $dst).Length) bytes)"
          }

          if ($edition -eq "cli-only") {
            $src = "target/$target/release/${{ matrix.cli_bin }}.exe"
            $dst = "markitdown-cli-only-windows-x64.exe"
            Copy-Item $src $dst
            Write-Host "CLI-only artifact: $dst ($('{0:N0}' -f (Get-Item $dst).Length) bytes)"
          }

      - name: Prepare artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          TARGET="${{ matrix.target }}"
          EDITION="${{ matrix.edition }}"

          if [ -n "${{ matrix.bin_name }}" ]; then
            cp "target/$TARGET/release/${{ matrix.bin_name }}" "markitdown-rst-${EDITION}-linux-x64"
            chmod +x "markitdown-rst-${EDITION}-linux-x64"
            echo "GUI artifact: markitdown-rst-${EDITION}-linux-x64 ($(stat -c%s markitdown-rst-${EDITION}-linux-x64) bytes)"
          fi

          if [ -n "${{ matrix.cli_bin }}" ] && [ "$EDITION" != "cli-only" ]; then
            cp "target/$TARGET/release/${{ matrix.cli_bin }}" "markitdown-cli-${EDITION}-linux-x64"
            chmod +x "markitdown-cli-${EDITION}-linux-x64"
            echo "CLI artifact: markitdown-cli-${EDITION}-linux-x64 ($(stat -c%s markitdown-cli-${EDITION}-linux-x64) bytes)"
          fi

          if [ "$EDITION" = "cli-only" ]; then
            cp "target/$TARGET/release/${{ matrix.cli_bin }}" "markitdown-cli-only-linux-x64"
            chmod +x "markitdown-cli-only-linux-x64"
            echo "CLI-only artifact: markitdown-cli-only-linux-x64 ($(stat -c%s markitdown-cli-only-linux-x64) bytes)"
          fi

      - name: Prepare artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          TARGET="${{ matrix.target }}"
          EDITION="${{ matrix.edition }}"

          if [ -n "${{ matrix.bin_name }}" ]; then
            cp "target/$TARGET/release/${{ matrix.bin_name }}" "markitdown-rst-${EDITION}-macos-x64"
            chmod +x "markitdown-rst-${EDITION}-macos-x64"
            echo "GUI artifact: markitdown-rst-${EDITION}-macos-x64 ($(stat -f%z markitdown-rst-${EDITION}-macos-x64) bytes)"
          fi

          if [ -n "${{ matrix.cli_bin }}" ] && [ "$EDITION" != "cli-only" ]; then
            cp "target/$TARGET/release/${{ matrix.cli_bin }}" "markitdown-cli-${EDITION}-macos-x64"
            chmod +x "markitdown-cli-${EDITION}-macos-x64"
            echo "CLI artifact: markitdown-cli-${EDITION}-macos-x64 ($(stat -f%z markitdown-cli-${EDITION}-macos-x64) bytes)"
          fi

          if [ "$EDITION" = "cli-only" ]; then
            cp "target/$TARGET/release/${{ matrix.cli_bin }}" "markitdown-cli-only-macos-x64"
            chmod +x "markitdown-cli-only-macos-x64"
            echo "CLI-only artifact: markitdown-cli-only-macos-x64 ($(stat -f%z markitdown-cli-only-macos-x64) bytes)"
          fi

      # ── Upload ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markitdown-${{ matrix.edition }}-${{ matrix.target }}
          path: |
            markitdown-rst-*
            markitdown-cli-*
